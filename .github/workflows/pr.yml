name: PR Build Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run hadolint on base/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: base/Dockerfile
          config: .github/lint/.hadolint.yaml
          verbose: true

      - name: Run hadolint on base/opencode.Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: base/opencode.Dockerfile
          config: .github/lint/.hadolint.yaml
          verbose: true

      - name: Run hadolint on base/qwencode.Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: base/qwencode.Dockerfile
          config: .github/lint/.hadolint.yaml
          verbose: true

      - name: Run hadolint on golang/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: golang/Dockerfile
          config: .github/lint/.hadolint.yaml
          verbose: true

      - name: Run hadolint on ansible/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ansible/Dockerfile
          config: .github/lint/.hadolint.yaml
          verbose: true

      - name: Run actionlint
        uses: rhysd/actionlint@v1
        with:
          config-file: .github/lint/.actionlint.yaml

      - name: Post actionlint results as PR comments
        uses: reviewdog/action-actionlint@v1
        with:
          github_token: ${{ secrets.github_token }}
          reporter: github-pr-review
          level: error

  build:
    name: Build (${{ matrix.variant }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [oc-go, qc-go, oc-ansible, qc-ansible]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/red55/sandbox-${{ matrix.variant }}
          tags: |
            type=pr,prefix=
            type=sha,prefix=
            type=ref,event=branch

      - name: Build image
        run: |
          make pull
          make all
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VER: ${{ github.sha }}

      - name: Login to GHCR (fork PRs only)
        uses: docker/login-action@v4
        if: github.event.pull_request.head.repo.fork == true
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push PR image to GHCR (fork PRs only)
        uses: docker/build-push-action@v7
        if: github.event.pull_request.head.repo.fork == true
        with:
          context: .
          push: true
          tags: ghcr.io/red55/sandbox-${{ matrix.variant }}:pr-${{ github.event.number }},ghcr.io/red55/sandbox-${{ matrix.variant }}:${{ github.sha }}
          cache-from: type=gha

  trivy-scan:
    name: Security Scan (${{ matrix.variant }})
    needs: build
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.fork == true
    strategy:
      fail-fast: false
      matrix:
        variant: [oc-go, qc-go, oc-ansible, qc-ansible]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/red55/sandbox-${{ matrix.variant }}:pr-${{ github.event.number }}
          format: sarif
          output: trivy-vuln-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          config: .github/lint/trivy.yaml

      - name: Run Trivy secret scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/red55/sandbox-${{ matrix.variant }}:pr-${{ github.event.number }}
          format: sarif
          output: trivy-secret-results.sarif
          scanners: secret
          config: .github/lint/trivy-secret.yaml
          ignorefile: .github/lint/trivy-ignore

      - name: Run Trivy misconfiguration scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-references: |
            base/Dockerfile
            base/opencode.Dockerfile
            base/qwencode.Dockerfile
            golang/Dockerfile
            ansible/Dockerfile
          format: sarif
          output: trivy-config-results.sarif
          config: .github/lint/trivy.yaml

      - name: Upload vulnerability SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-vuln-results.sarif
          category: trivy-vuln-${{ matrix.variant }}

      - name: Upload secret scan SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-secret-results.sarif
          category: trivy-secret-${{ matrix.variant }}

      - name: Upload config scan SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-config-results.sarif
          category: trivy-config-${{ matrix.variant }}

      - name: Post Trivy findings as PR comment
        uses: reviewdog/action-trivy@v0
        if: always()
        with:
          github_token: ${{ secrets.github_token }}
          reporter: github-pr-review
          level: warning
          path: trivy-vuln-results.sarif
          filter_mode: nofilter
