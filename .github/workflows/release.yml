name: Release Pipeline

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run hadolint on base/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: base/Dockerfile
          config: .github/lint/.hadolint.yaml
          verbose: true

      - name: Run hadolint on base/opencode.Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: base/opencode.Dockerfile
          config: .github/lint/.hadolint.yaml
          verbose: true

      - name: Run hadolint on base/qwencode.Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: base/qwencode.Dockerfile
          config: .github/lint/.hadolint.yaml
          verbose: true

      - name: Run hadolint on golang/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: golang/Dockerfile
          config: .github/lint/.hadolint.yaml
          verbose: true

      - name: Run hadolint on ansible/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ansible/Dockerfile
          config: .github/lint/.hadolint.yaml
          verbose: true

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: hadolint.sarif
          category: hadolint

      - name: Run actionlint
        uses: rhysd/actionlint@v1
        with:
          config-file: .github/lint/.actionlint.yaml

  build:
    name: Build (${{ matrix.variant }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [oc-go, qc-go, oc-ansible, qc-ansible]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/red55/sandbox-${{ matrix.variant }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build all variants with make
        run: |
          make pull
          make all
        env:
          VER: ${{ github.sha }}

  security:
    name: Security Scan
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        variant: [oc-go, qc-go, oc-ansible, qc-ansible]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (stub for Phase 3)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/red55/sandbox-${{ matrix.variant }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
        continue-on-error: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy
