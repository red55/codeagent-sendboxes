name: Release Pipeline

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    strategy:
      fail-fast: false
      matrix:
        variant:
          - 'base/Dockerfile'
          - 'base/opencode.Dockerfile'
          - 'base/qwencode.Dockerfile'
          - 'golang/Dockerfile'
          - 'ansible/Dockerfile'
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run hadolint on base/Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: ${{ matrix.variant }}
          config: .github/lint/.hadolint.yaml
          verbose: true
          output-file: hadolint-${{ matrix.variant }}.sarif
          format: sarif
      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: hadolint.sarif
          category: hadolint-${{ matrix.variant }}

      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-pr-review
          fail_level: error
          github_token: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build (${{ matrix.variant }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [oc-go, qc-go, oc-ansible, qc-ansible]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Build base images
        run: make base
        env:
          VER: ${{ github.sha }}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/red55/sandbox-${{ matrix.variant }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.variant == 'oc-go' || matrix.variant == 'qc-go' && 'golang/Dockerfile' || 'ansible/Dockerfile' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

  security:
    name: Security Scan (${{ matrix.variant }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [oc-go, qc-go, oc-ansible, qc-ansible]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/red55/sandbox-${{ matrix.variant }}:${{ github.sha }}
          format: sarif
          output: trivy-vuln-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          config: .github/lint/trivy.yaml

      - name: Run Trivy secret scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/red55/sandbox-${{ matrix.variant }}:${{ github.sha }}
          format: sarif
          output: trivy-secret-results.sarif
          scanners: secret
          config: .github/lint/trivy-secret.yaml
          ignorefile: .github/lint/trivy-ignore

      - name: Run Trivy misconfiguration scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-references: |
            base/Dockerfile
            base/opencode.Dockerfile
            base/qwencode.Dockerfile
            golang/Dockerfile
            ansible/Dockerfile
          format: sarif
          output: trivy-config-results.sarif
          config: .github/lint/trivy.yaml

      - name: Upload vulnerability SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-vuln-results.sarif
          category: trivy-vuln-${{ matrix.variant }}

      - name: Upload secret scan SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-secret-results.sarif
          category: trivy-secret-${{ matrix.variant }}

      - name: Upload config scan SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-config-results.sarif
          category: trivy-config-${{ matrix.variant }}

  release-notes:
    name: Generate Release Notes
    needs: security
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        id: create_release
        uses:  softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
